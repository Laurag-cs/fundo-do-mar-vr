<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fundo do Mar VR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('limite', {
      tick: function () {
        const pos = this.el.object3D.position;
        const limite = 2.4;
        pos.x = Math.min(Math.max(pos.x, -limite), limite);
        pos.z = Math.min(Math.max(pos.z, -limite), limite);
      }
    });
  </script>
</head>
<body>
  <a-scene fog="type: linear; color: #080F2E; near: 5; far: 100">
    <a-assets>
      <img id="chao" src="chao.jpg">
      <a-asset-item id="tubarao-glb" src="megalodon.glb"></a-asset-item>
      <a-asset-item id="baleia-obj" src="baleia.obj"></a-asset-item>
      <a-asset-item id="baleia-mtl" src="baleia.mtl"></a-asset-item>
      <a-asset-item id="agua-obj" src="aviva.obj"></a-asset-item>
      <a-asset-item id="agua-mtl" src="aviva.mtl"></a-asset-item>
      <a-asset-item id="crab-obj" src="crab.obj"></a-asset-item>
      <a-asset-item id="crab-mtl" src="crab.mtl"></a-asset-item>
      <a-asset-item id="pboi-obj" src="12957_Manatee_v1_l3.obj"></a-asset-item>
      <a-asset-item id="pboi-mtl" src="12957_Manatee_v1_l3.mtl"></a-asset-item>
      <a-asset-item id="peixe1-obj" src="peixe.obj"></a-asset-item>
      <a-asset-item id="peixe1-mtl" src="peixe.mtl"></a-asset-item>
      <a-asset-item id="tartaruga-obj" src="tartaruga.obj"></a-asset-item>
      <a-asset-item id="tartaruga-mtl" src="tartaruga.mtl"></a-asset-item>
    
    </a-assets>

    <a-plane src="#chao" rotation="-90 0 0" width="150" height="150" color="#555"></a-plane>

    <a-entity position="0 1.6 0">
      <a-camera limite cursor="rayOrigin: mouse"></a-camera>
    </a-entity>

    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="0 10 5" intensity="0.8"></a-light>

    <a-sky color="#0a2540"></a-sky>

    <a-entity id="jaula" position="0 0 0">
      <a-box position="0 0 0" width="6" height="0.1" depth="6" color="#444"></a-box>
      <a-box position="0 5 0" width="6" height="0.1" depth="6" color="#444"></a-box>

      <a-box position="-2.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-1.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-0.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="0.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="1.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="2.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>

      <a-box position="-2.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-1.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-0.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="0.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="1.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="2.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>

      <a-box position="-3 2.5 -2.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-3 2.5 -1.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-3 2.5 -0.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-3 2.5 0.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-3 2.5 1.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="-3 2.5 2.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>

      <a-box position="3 2.5 -2.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="3 2.5 -1.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="3 2.5 -0.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="3 2.5 0.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="3 2.5 1.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
      <a-box position="3 2.5 2.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
    </a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');

    let tubarao = document.createElement('a-gltf-model');
    tubarao.setAttribute('src','#tubarao-glb');
    tubarao.setAttribute('scale','0.09 0.09 0.09');
    tubarao.setAttribute('rotation','0 90 0');
    tubarao.setAttribute('position','-50 12 20');
    tubarao.setAttribute('animation','property:position;to:300 8 30;dur:32000;loop:true');
    tubarao.setAttribute('animation__wiggle','property:rotation;dur:900;dir:alternate;loop:true;to:0 100 0;easing:easeInOutSine');

    scene.appendChild(tubarao);

    let baleia = document.createElement('a-obj-model');
    baleia.setAttribute('src','#baleia-obj');
    baleia.setAttribute('mtl','#baleia-mtl');
    baleia.setAttribute('rotation','-90 0 0');
    baleia.setAttribute('scale','0.05 0.05 0.05');
    baleia.setAttribute('position','90 19 -5');
    baleia.setAttribute('animation','property:position;to:-300 19 -75;dur:40000;loop:true');
    scene.appendChild(baleia);

    let aguaViva = document.createElement('a-obj-model');
    aguaViva.setAttribute('src','#agua-obj');
    aguaViva.setAttribute('mtl','#agua-mtl');
    aguaViva.setAttribute('scale','2 2 2');
    aguaViva.setAttribute('position','0 2 12');
    aguaViva.setAttribute('animation','property:position;to:0 6 12;dur:6000;dir:alternate;loop:true;easing:easeInOutSine');
    scene.appendChild(aguaViva);

    let aguaViva2 = document.createElement('a-obj-model');
    aguaViva2.setAttribute('src','#agua-obj');
    aguaViva2.setAttribute('mtl','#agua-mtl');
    aguaViva2.setAttribute('scale','2 2 2');
    aguaViva2.setAttribute('position','5 2 15');
    aguaViva2.setAttribute('animation','property:position;to:5 6 15;dur:8000;dir:alternate;loop:true;easing:easeInOutSine');
    scene.appendChild(aguaViva2);
  
    let aguaViva3 = document.createElement('a-obj-model');
    aguaViva3.setAttribute('src','#agua-obj');
    aguaViva3.setAttribute('mtl','#agua-mtl');
    aguaViva3.setAttribute('scale','2 2 2');
    aguaViva3.setAttribute('position','9 2 10');
    aguaViva3.setAttribute('animation','property:position;to:9 8 10;dur:7000;dir:alternate;loop:true;easing:easeInOutSine');
    scene.appendChild(aguaViva3);

    let crab = document.createElement('a-obj-model');
    crab.setAttribute('src','#crab-obj');
    crab.setAttribute('mtl','#crab-mtl');
    crab.setAttribute('rotation','0 -90 0');
    crab.setAttribute('scale','0.3 0.3 0.3');
    crab.setAttribute('position','20 0 0');
    crab.setAttribute('animation','property:position;to:20 0 5;dur:1500;dir:alternate;loop:true;easing:linear');
    scene.appendChild(crab);

    let pboi = document.createElement('a-obj-model');
    pboi.setAttribute('src','#pboi-obj');
    pboi.setAttribute('mtl','#pboi-mtl');
    pboi.setAttribute('rotation','260 50 0');
    pboi.setAttribute('scale','0.05 0.05 0.05');
    pboi.setAttribute('position','-30 5 0');
    pboi.setAttribute('animation','property:position;to:-30 8 0;dur:3000;dir:alternate;loop:true;easing:easeInOutSine');
    scene.appendChild(pboi);

    function criarPeixe(scene) {
    var cardume1 = document.createElement('a-entity');
    var peixe1 = document.createElement('a-obj-model');

    peixe1.setAttribute('src', '#peixe1-obj');
    peixe1.setAttribute('mtl', '#peixe1-mtl');

    var x = Math.random() * 40 - 20;
    var y = Math.random() * 8 + 2;
    var z = -80;

    cardume1.setAttribute('position', x + ' ' + y + ' ' + z);
    peixe1.setAttribute('rotation', '-90 0 0');
    peixe1.setAttribute('scale', '0.1 0.1 0.1');

    cardume1.setAttribute('animation',
        'property: position; to: ' + x + ' ' + y + ' 80; dur: 30000; loop: true; easing: linear');

    cardume1.appendChild(peixe1);
    scene.appendChild(cardume1);
    }
    criarPeixe(scene); 
    for (var i = 0; i < 15; i++) {
      criarPeixe(scene);
    }

    let tartaruga = document.createElement('a-obj-model');
    tartaruga.setAttribute('src','#tartaruga-obj');
    tartaruga.setAttribute('mtl','#tartaruga-mtl');
    tartaruga.setAttribute('rotation','-70 0 0');
    tartaruga.setAttribute('scale','0.06 0.06 0.06');
    tartaruga.setAttribute('position','-300 5 20');
    tartaruga.setAttribute('animation','property:position;to:300 5 20;dur:45000;loop:true;easing:linear');
    tartaruga.setAttribute('animation__spin','property:rotation.x;to:-450;dur:9000;loop:true;easing:linear');
    scene.appendChild(tartaruga);
  </script>
</body>
</html>
