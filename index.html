<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Fundo do Mar VR - Sem Arquivos Locais</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
        // Componente de colisão da jaula
        AFRAME.registerComponent('limite', {
            tick: function () {
                var pos = this.el.object3D.position;
                var limite = 2.4;
                if (pos.x > limite) pos.x = limite;
                if (pos.x < -limite) pos.x = -limite;
                if (pos.z > limite) pos.z = limite;
                if (pos.z < -limite) pos.z = -limite;
            }
        });
    </script>
</head>

<body>
    <a-scene>

        <a-assets>
            <img id="areia-externa" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
        </a-assets>
        
        <a-plane
            src="#areia-externa"
            rotation="-90 0 0"
            width="100"
            height="100"
            position="0 -0.02 0"
            material="shader: flat; color: #c2b280; repeat: 20 20">
        </a-plane>

        <a-entity position="0 1.6 0">
            <a-camera limite>
                <a-cursor color="#FF0000"></a-cursor>
            </a-camera>
        </a-entity>

        <a-light type="ambient" intensity="0.8"></a-light>
        <a-sky color="#0a2540"></a-sky>

        <a-entity id="jaula">
            <a-box position="0 0 0" width="6" height="0.1" depth="6" color="#444"></a-box>
            <a-box position="0 5 0" width="6" height="0.1" depth="6" color="#444"></a-box>

            <a-box position="-2.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-1.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-0.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="0.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="1.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="2.5 2.5 -3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>

            <a-box position="-2.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-1.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-0.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="0.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="1.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="2.5 2.5 3" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>

            <a-box position="-3 2.5 -2.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-3 2.5 -1.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-3 2.5 -0.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-3 2.5 0.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-3 2.5 1.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="-3 2.5 2.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>

            <a-box position="3 2.5 -2.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="3 2.5 -1.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="3 2.5 -0.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="3 2.5 0.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="3 2.5 1.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>
            <a-box position="3 2.5 2.5" width="0.1" height="5" depth="0.1" color="#aaa"></a-box>      
        </a-entity>

    </a-scene>
</body>
</html>
